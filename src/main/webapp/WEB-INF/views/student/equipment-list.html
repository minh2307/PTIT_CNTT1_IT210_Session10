<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Danh sách thiết bị</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-desktop"></i> Danh sách thiết bị</h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/student}">Trang chủ</a></li>
                    <li class="breadcrumb-item active">Thiết bị</li>
                </ol>
            </nav>
        </div>
        
        <div class="row">
            <div th:each="equipment : ${equipments}" class="col-md-4 mb-4">
                <div class="card h-100">
                    <img th:src="${equipment.imageUrl}" class="card-img-top" th:alt="${equipment.name}" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${equipment.name}">Tên thiết bị</h5>
                        <p class="card-text" th:text="${equipment.description}">Mô tả thiết bị</p>
                        <div class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge bg-success" th:text="'Còn: ' + ${equipment.availableQuantity}">
                                    <i class="fas fa-check-circle"></i> Còn: 0
                                </span>
                                <span class="text-muted small">
                                    <i class="fas fa-box"></i> Tồn kho
                                </span>
                            </div>
                            <a th:href="@{/student/booking/equipment/{id}(id=${equipment.id})}" 
                               class="btn btn-primary w-100"
                               th:disabled="${equipment.availableQuantity == 0}">
                                <i class="fas fa-hand-holding"></i> 
                                <span th:if="${equipment.availableQuantity == 0}">Hết hàng</span>
                                <span th:unless="${equipment.availableQuantity == 0}">Đăng ký mượn</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${#lists.isEmpty(equipments)}" class="text-center py-5">
            <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
            <h4 class="text-muted">Không có thiết bị nào</h4>
            <p class="text-muted">Hiện tại chưa có thiết bị nào trong hệ thống.</p>
        </div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Danh sách phòng Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="fragments/header :: siteHeader"></div>

<div class="container py-5">
    <div class="mb-4">
        <h2 class="fw-bold">Danh sách phòng Lab</h2>
        <p class="text-secondary mb-0">Hiển thị tên, ảnh minh họa và trạng thái còn trống.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="room : ${rooms}">
            <div class="card h-100 shadow-sm border-0">
                <img th:src="${room.image}" th:alt="${room.name}" class="card-img-top fixed-image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${room.name}">Tên phòng</h5>
                    <p class="card-text text-secondary" th:text="${room.description}">Mô tả</p>
                    <p class="mb-3">
                        <span class="badge text-bg-info">
                            Còn trống: <span th:text="${room.availableQuantity}">1</span>
                        </span>
                    </p>
                    <div class="d-flex gap-2">
                        <a th:href="@{/lab-rooms/detail}" class="btn btn-outline-primary btn-sm">Xem chi tiết</a>
                        <a th:href="@{/borrow-form}" class="btn btn-primary btn-sm">Đăng ký sử dụng</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: siteFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

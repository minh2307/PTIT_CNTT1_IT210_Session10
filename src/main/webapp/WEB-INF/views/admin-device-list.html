<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${pageTitle}">Quản lý thiết bị</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="fragments/header :: siteHeader"></div>

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Quản lý danh sách thiết bị</h2>
      <p class="text-secondary mb-0">Giao diện quản trị danh sách thiết bị.</p>
    </div>
    <button class="btn btn-primary">+ Thêm thiết bị</button>
  </div>

  <div class="card shadow-sm border-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Tên thiết bị</th>
          <th>Mô tả</th>
          <th>Số lượng còn</th>
          <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="device : ${devices}">
          <td th:text="${device.id}">1</td>
          <td th:text="${device.name}">Tên thiết bị</td>
          <td th:text="${device.description}">Mô tả</td>
          <td>
            <span class="badge text-bg-success" th:text="${device.availableQuantity}">0</span>
          </td>
          <td>
            <button class="btn btn-sm btn-outline-primary">Sửa</button>
            <button class="btn btn-sm btn-outline-danger">Xóa</button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div th:replace="fragments/footer :: siteFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

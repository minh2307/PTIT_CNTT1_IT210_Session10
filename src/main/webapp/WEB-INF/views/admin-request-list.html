<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${pageTitle}">Danh sách yêu cầu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="fragments/header :: siteHeader"></div>

<div class="container py-5">
  <div class="mb-4">
    <h2 class="fw-bold">Danh sách yêu cầu mượn</h2>
    <p class="text-secondary mb-0">Giao diện để quản lý Lab xem các yêu cầu sinh viên đã gửi.</p>
  </div>

  <div class="card shadow-sm border-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
        <tr>
          <th>Họ tên</th>
          <th>Mã SV</th>
          <th>Thiết bị/Phòng</th>
          <th>Số lượng</th>
          <th>Ngày nhận</th>
          <th>Ngày trả</th>
          <th>Trạng thái</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="request : ${requests}">
          <td th:text="${request.studentName}">Nguyễn Văn A</td>
          <td th:text="${request.studentCode}">SV001234</td>
          <td th:text="${request.itemName}">Tên thiết bị</td>
          <td th:text="${request.quantity}">1</td>
          <td th:text="${request.borrowDate}">20/04/2026</td>
          <td th:text="${request.returnDate}">22/04/2026</td>
          <td>
                        <span class="badge"
                              th:classappend="${request.status == 'Đã duyệt'} ? ' text-bg-success' :
                                              (${request.status == 'Từ chối'} ? ' text-bg-danger' : ' text-bg-warning')"
                              th:text="${request.status}">
                            Chờ duyệt
                        </span>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div th:replace="fragments/footer :: siteFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${pageTitle}">Chi tiết thiết bị</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="fragments/header :: siteHeader"></div>

<div class="container py-5">
  <div class="card shadow-sm border-0">
    <div class="row g-0">
      <div class="col-md-5">
        <img th:src="${device.image}" th:alt="${device.name}" class="img-fluid h-100 object-fit-cover rounded-start">
      </div>
      <div class="col-md-7">
        <div class="card-body p-4">
          <h2 class="card-title fw-bold mb-3" th:text="${device.name}">Tên thiết bị</h2>
          <p class="text-secondary" th:text="${device.description}">Mô tả thiết bị</p>
          <p>
            <strong>Số lượng còn lại:</strong>
            <span class="badge text-bg-success" th:text="${device.availableQuantity}">0</span>
          </p>
          <div class="mt-4 d-flex gap-2">
            <a th:href="@{/devices}" class="btn btn-outline-secondary">Quay lại</a>
            <a th:href="@{/borrow-form}" class="btn btn-primary">Đăng ký mượn</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="fragments/footer :: siteFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

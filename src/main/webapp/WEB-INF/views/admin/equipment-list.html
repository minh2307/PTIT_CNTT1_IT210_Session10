<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Quản lý thiết bị</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    
    <div class="container mt-4">
        <!-- Success Message -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-desktop"></i> Quản lý thiết bị</h2>
            <div>
                <a th:href="@{/admin}" class="btn btn-secondary me-2">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </a>
                <a th:href="@{/admin/equipment/add}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Thêm thiết bị
                </a>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div th:if="${#lists.isEmpty(equipments)}" class="text-center py-5">
                    <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                    <h4 class="text-muted">Không có thiết bị nào</h4>
                    <p class="text-muted">Chưa có thiết bị nào trong hệ thống.</p>
                    <a th:href="@{/admin/equipment/add}" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Thêm thiết bị đầu tiên
                    </a>
                </div>
                
                <div th:if="${!#lists.isEmpty(equipments)}">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Tên thiết bị</th>
                                    <th>Mô tả</th>
                                    <th>Số lượng tồn</th>
                                    <th>Hình ảnh</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="equipment : ${equipments}">
                                    <td th:text="${equipment.id}">1</td>
                                    <td>
                                        <strong th:text="${equipment.name}">Tên thiết bị</strong>
                                    </td>
                                    <td th:text="${equipment.description}">Mô tả</td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${equipment.availableQuantity > 10 ? 'bg-success' : (equipment.availableQuantity > 5 ? 'bg-warning' : 'bg-danger')}"
                                              th:text="${equipment.availableQuantity}">
                                            0
                                        </span>
                                    </td>
                                    <td>
                                        <img th:src="${equipment.imageUrl}" 
                                             th:alt="${equipment.name}" 
                                             class="img-thumbnail" 
                                             style="max-width: 60px; height: 40px; object-fit: cover;">
                                    </td>
                                    <td>
                                        <div class="btn-group" role="group">
                                            <a th:href="@{/admin/equipment/edit/{id}(id=${equipment.id})}" 
                                               class="btn btn-sm btn-outline-primary"
                                               title="Chỉnh sửa">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{/admin/equipment/delete/{id}(id=${equipment.id})}" 
                                               class="btn btn-sm btn-outline-danger"
                                               title="Xóa"
                                               onclick="return confirm('Bạn có chắc muốn xóa thiết bị này?')">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>

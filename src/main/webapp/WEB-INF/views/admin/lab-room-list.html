<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Quản lý phòng Lab</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    
    <div class="container mt-4">
        <!-- Success Message -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-door-open"></i> Quản lý phòng Lab</h2>
            <div>
                <a th:href="@{/admin}" class="btn btn-secondary me-2">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </a>
                <a th:href="@{/admin/lab-rooms/add}" class="btn btn-success">
                    <i class="fas fa-plus"></i> Thêm phòng Lab
                </a>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div th:if="${#lists.isEmpty(labRooms)}" class="text-center py-5">
                    <i class="fas fa-door-closed fa-3x text-muted mb-3"></i>
                    <h4 class="text-muted">Không có phòng Lab nào</h4>
                    <p class="text-muted">Chưa có phòng Lab nào trong hệ thống.</p>
                    <a th:href="@{/admin/lab-rooms/add}" class="btn btn-success">
                        <i class="fas fa-plus"></i> Thêm phòng Lab đầu tiên
                    </a>
                </div>
                
                <div th:if="${!#lists.isEmpty(labRooms)}">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Tên phòng Lab</th>
                                    <th>Mô tả</th>
                                    <th>Sức chứa</th>
                                    <th>Hình ảnh</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="labRoom : ${labRooms}">
                                    <td th:text="${labRoom.id}">1</td>
                                    <td>
                                        <strong th:text="${labRoom.name}">Tên phòng Lab</strong>
                                    </td>
                                    <td th:text="${labRoom.description}">Mô tả</td>
                                    <td>
                                        <span class="badge bg-info" th:text="${labRoom.capacity}">
                                            <i class="fas fa-users"></i> 0
                                        </span>
                                    </td>
                                    <td>
                                        <img th:src="${labRoom.imageUrl}" 
                                             th:alt="${labRoom.name}" 
                                             class="img-thumbnail" 
                                             style="max-width: 60px; height: 40px; object-fit: cover;">
                                    </td>
                                    <td>
                                        <div class="btn-group" role="group">
                                            <a th:href="@{/admin/lab-rooms/edit/{id}(id=${labRoom.id})}" 
                                               class="btn btn-sm btn-outline-primary"
                                               title="Chỉnh sửa">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{/admin/lab-rooms/delete/{id}(id=${labRoom.id})}" 
                                               class="btn btn-sm btn-outline-danger"
                                               title="Xóa"
                                               onclick="return confirm('Bạn có chắc muốn xóa phòng Lab này?')">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>

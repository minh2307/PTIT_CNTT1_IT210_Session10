<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${pageTitle}">Form đăng ký mượn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="fragments/header :: siteHeader"></div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Form đăng ký mượn thiết bị / sử dụng phòng Lab</h3>
        </div>
        <div class="card-body p-4">
          <form action="#" method="post">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Họ và tên sinh viên</label>
                <input type="text" class="form-control" placeholder="Nhập họ và tên">
              </div>

              <div class="col-md-6">
                <label class="form-label">Mã sinh viên</label>
                <input type="text" class="form-control" placeholder="Ví dụ: SV001234">
              </div>

              <div class="col-md-6">
                <label class="form-label">Email liên hệ</label>
                <input type="email" class="form-control" placeholder="example@email.com">
              </div>

              <div class="col-md-6">
                <label class="form-label">Số lượng muốn mượn</label>
                <input type="number" class="form-control" min="1" value="1">
              </div>

              <div class="col-md-6">
                <label class="form-label">Ngày dự kiến nhận</label>
                <input type="date" class="form-control">
              </div>

              <div class="col-md-6">
                <label class="form-label">Ngày dự kiến trả</label>
                <input type="date" class="form-control">
              </div>

              <div class="col-12">
                <label class="form-label">Lý do mượn</label>
                <textarea class="form-control" rows="4" placeholder="Nhập lý do mượn"></textarea>
              </div>

              <div class="col-12">
                <label class="form-label">Ghi chú thêm (tuỳ chọn)</label>
                <input type="text" class="form-control" placeholder="Thông tin bổ sung">
              </div>
            </div>

            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-success">Gửi yêu cầu</button>
              <button type="reset" class="btn btn-outline-secondary">Nhập lại</button>
            </div>

            <div class="alert alert-info mt-4 mb-0">
              Đây là giao diện khung. Sau này nhóm sẽ gắn binding, validation và submit thật vào form này.
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="fragments/footer :: siteFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
